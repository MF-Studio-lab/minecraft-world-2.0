<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>小方塊世界 2.4</title>
<style>
html, body {
  margin: 0; padding: 0;
  background: #000;
  width: 100%; height: 100%;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Courier New', monospace;
}
#c { display: block; cursor: crosshair; }
#overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.92);
  color: #fff;
  display: flex; align-items: center; justify-content: center;
  z-index: 99;
}
.box { text-align: center; padding: 20px; max-width: 800px; }
.box h1 { font-size: 2.8em; color: #56d926; text-shadow: 3px 3px #1a5c0e; margin-bottom: 16px; }
.box p { font-size: 1.05em; color: #ddd; margin: 7px 0; }
.box .key { background: #333; border: 1px solid #666; border-radius: 4px; padding: 2px 7px; font-weight: bold; color: #fff; }
.box button {
  margin-top: 26px;
  padding: 14px 52px;
  font-size: 1.4em;
  background: linear-gradient(180deg, #56d926, #3a9c18);
  color: #fff;
  border: 2px solid #2d7a10;
  border-radius: 8px;
  cursor: pointer;
  font-family: inherit;
  font-weight: bold;
  text-shadow: 1px 2px #000;
  transition: all 0.1s;
}
.box button:hover { background: linear-gradient(180deg, #6bef38, #4ab820); transform: scale(1.05); }
.box button:active { transform: scale(0.96); }
.box .setting-row {
  display: flex; align-items: center; justify-content: center; gap: 15px;
  margin: 12px 0; font-size: 1.1em;
}
.box .setting-row label { color: #ffd700; font-weight: bold; }
.box .setting-row select {
  padding: 8px 15px; font-size: 1em; background: #333; color: #fff;
  border: 2px solid #56d926; border-radius: 5px; cursor: pointer;
}
#crafting {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: rgba(30,20,10,0.95);
  border: 3px solid #8B4513;
  border-radius: 12px;
  padding: 20px;
  display: none;
  z-index: 100;
  min-width: 500px;
  max-height: 85vh;
  overflow-y: auto;
}
#crafting h2 { color: #ffd700; text-align: center; margin: 0 0 15px 0; }
#crafting h3 { color: #aaa; text-align: center; margin: 10px 0; font-size: 14px; }
.craft-grid {
  display: grid;
  grid-template-columns: repeat(3, 70px);
  gap: 4px;
  margin: 0 auto 15px;
  width: fit-content;
  padding: 10px;
  background: rgba(0,0,0,0.3);
  border-radius: 8px;
}
.craft-slot {
  width: 70px; height: 70px;
  background: #5a3a1a;
  border: 2px solid #8B4513;
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; color: white;
  cursor: pointer;
  position: relative;
  transition: all 0.1s;
}
.craft-slot:hover { border-color: #ffd700; background: #6a4a2a; }
.craft-slot .count { position: absolute; bottom: 2px; right: 4px; font-size: 12px; color: #fff; }
#craft-result {
  display: flex; align-items: center; justify-content: center;
  gap: 15px; margin: 15px 0;
  padding: 10px;
  background: rgba(0,0,0,0.3);
  border-radius: 8px;
}
#craft-result .craft-slot { width: 80px; height: 80px; font-size: 36px; background: #4a2a0a; }
#craft-result span { color: #ffd700; font-size: 28px; }
#craft-btn {
  padding: 12px 40px; font-size: 16px;
  background: #4CAF50; color: white; border: none; border-radius: 5px;
  cursor: pointer; margin: 5px;
  font-weight: bold;
}
#craft-btn:hover { background: #45a049; }
#craft-btn:disabled { background: #666; cursor: not-allowed; }
#auto-craft-btn {
  padding: 12px 40px; font-size: 16px;
  background: #2196F3; color: white; border: none; border-radius: 5px;
  cursor: pointer; margin: 5px;
  font-weight: bold;
}
#auto-craft-btn:hover { background: #1976D2; }
#auto-craft-btn:disabled { background: #666; cursor: not-allowed; }
#craft-list {
  margin-top: 15px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
  gap: 10px;
  max-height: 200px;
  overflow-y: auto;
}
.craft-item {
  background: #3a2a1a;
  border: 2px solid #5a3a1a;
  border-radius: 6px;
  padding: 10px;
  cursor: pointer;
  text-align: center;
  color: #ddd;
  font-size: 12px;
  transition: all 0.1s;
}
.craft-item:hover { border-color: #ffd700; background: #4a3a2a; transform: scale(1.05); }
.craft-item .emoji { font-size: 28px; display: block; margin-bottom: 4px; }
.craft-item.disabled { opacity: 0.4; cursor: not-allowed; }
#close-craft {
  position: absolute; top: 10px; right: 15px;
  background: #c0392b; color: white; border: none;
  padding: 5px 12px; border-radius: 4px; cursor: pointer; font-size: 14px;
}
#close-craft:hover { background: #e74c3c; }
#inv-panel {
  margin: 10px 0;
  padding: 10px;
  background: rgba(0,0,0,0.3);
  border-radius: 8px;
  max-height: 120px;
  overflow-y: auto;
}
#inv-panel h4 { color: #ffd700; margin: 0 0 8px 0; font-size: 14px; }
.inv-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(50px, 1fr));
  gap: 4px;
}
.inv-item {
  background: #4a3a2a;
  border: 1px solid #6a5a4a;
  border-radius: 4px;
  padding: 5px;
  text-align: center;
  cursor: pointer;
  font-size: 20px;
  transition: all 0.1s;
}
.inv-item:hover { border-color: #ffd700; background: #5a4a3a; }
.inv-item.selected { border-color: #ffd700; background: #6a5a4a; }
.inv-item .cnt { font-size: 10px; color: #fff; display: block; }
#death-screen {
  position: fixed; inset: 0;
  background: rgba(180, 20, 20, 0.85);
  display: none; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 200;
  color: white;
}
#death-screen h1 { font-size: 4em; color: #ff4444; text-shadow: 3px 3px #000; margin-bottom: 20px; }
#death-screen p { font-size: 1.5em; margin: 10px; }
#death-screen button {
  padding: 15px 40px; font-size: 1.3em;
  background: #e74c3c; color: white; border: 2px solid #c0392b;
  border-radius: 8px; cursor: pointer; margin-top: 20px;
}
#death-screen button:hover { background: #c0392b; }
#msg-area {
  position: fixed;
  top: 80px; left: 50%; transform: translateX(-50%);
  z-index: 50;
  pointer-events: none;
}
.msg {
  background: rgba(0,0,0,0.7);
  color: #fff;
  padding: 8px 16px;
  border-radius: 4px;
  margin: 4px 0;
  font-size: 14px;
  animation: fadeOut 3s forwards;
}
@keyframes fadeOut {
  0% { opacity: 1; }
  70% { opacity: 1; }
  100% { opacity: 0; }
}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="overlay">
  <div class="box">
    <h1>⛏️ 小方塊世界 2.4 ⛏️</h1>
    <p><span class="key">WASD</span> 或 <span class="key">方向鍵</span> 移動 &nbsp;|&nbsp; <span class="key">空格</span> 跳躍</p>
    <p><span class="key">左鍵按住</span> 挖掘/攻擊 &nbsp;|&nbsp; <span class="key">右鍵</span> 放置方塊</p>
    <p><span class="key">1~8</span> 切換物品 &nbsp;|&nbsp; 滑鼠滾輪也可以切換</p>
    <p><span class="key">E</span> 打開合成表 &nbsp;|&nbsp; <span class="key">F</span> 吃東西</p>
    <p style="color:#ffd700;">⭐ 挖掘礦石、蓋房子、狩獵動物、合成工具！</p>
    <p style="color:#ff6b6b;">⚠️ 晚上會出現殭屍和骷髏，小心生存！</p>
    <p style="color:#4fc3f7;">🌊 尋找河流釣魚，探索地底找鑽石！</p>

    <div class="setting-row">
      <label>🌅 時間週期:</label>
      <select id="daySpeed">
        <option value="0.2">超慢 (5分鐘)</option>
        <option value="0.4">慢速 (2.5分鐘)</option>
        <option value="0.8" selected>正常 (1.25分鐘)</option>
        <option value="1.6">快速 (37秒)</option>
        <option value="3.2">超快 (18秒)</option>
      </select>
    </div>

    <button onclick="startGame()">🚀 開始遊戲！</button>
  </div>
</div>

<div id="crafting">
  <button id="close-craft" onclick="closeCrafting()">✕ 關閉</button>
  <h2>🔨 合成表</h2>
  <h3>👇 點擊下方背包物品，再點擊上方九宮格放入</h3>

  <div class="craft-grid" id="craft-grid">
    <div class="craft-slot" id="cg0" onclick="clickCraftSlot(0)"></div>
    <div class="craft-slot" id="cg1" onclick="clickCraftSlot(1)"></div>
    <div class="craft-slot" id="cg2" onclick="clickCraftSlot(2)"></div>
    <div class="craft-slot" id="cg3" onclick="clickCraftSlot(3)"></div>
    <div class="craft-slot" id="cg4" onclick="clickCraftSlot(4)"></div>
    <div class="craft-slot" id="cg5" onclick="clickCraftSlot(5)"></div>
    <div class="craft-slot" id="cg6" onclick="clickCraftSlot(6)"></div>
    <div class="craft-slot" id="cg7" onclick="clickCraftSlot(7)"></div>
    <div class="craft-slot" id="cg8" onclick="clickCraftSlot(8)"></div>
  </div>

  <div id="craft-result">
    <div class="craft-slot" id="result-slot"></div>
    <span>➡</span>
    <div class="craft-slot" id="output-slot"></div>
  </div>

  <div style="text-align: center;">
    <button id="craft-btn" onclick="doCraft()" disabled>🔨 手動合成</button>
    <button id="auto-craft-btn" onclick="autoCraft()">⚡ 一鍵合成</button>
  </div>

  <div id="inv-panel">
    <h4>📦 背包物品（點擊選擇）</h4>
    <div class="inv-grid" id="inv-grid"></div>
  </div>

  <h3>📋 可合成配方（點擊一鍵合成）</h3>
  <div id="craft-list"></div>
</div>

<div id="death-screen">
  <h1>💀 你死了！</h1>
  <p id="death-reason">你被怪物殺死了...</p>
  <p>分數: <span id="death-score">0</span></p>
  <button onclick="respawn()">🔄 重新開始</button>
</div>

<div id="msg-area"></div>

<script>
const cv = document.getElementById('c');
const cx = cv.getContext('2d');
const W = Math.min(window.innerWidth, 1024);
const H = Math.min(window.innerHeight, 640);
cv.width = W; cv.height = H;

// ─── Constants ────────────────────────────────────────────────────────────────
const TS = 32;
const WW = 300;
const WH = 100;
const GRAV = 0.45;
const JUMP = -10;
const SPEED = 4.2;

// Block IDs
const AIR=0,GRASS=1,DIRT=2,STONE=3,WOOD=4,LEAVES=5,SAND=6,WATER=7,
      BED=8,COAL=9,IRON=10,GOLD=11,DIAM=12,PLANK=13,BRICK=14,GLASS=15,TORCH=16,
      PORK=17,BEEF=18,CHICKEN=19,FISH=20,ROTTEN=21,BONE=22,ARROW=23,
      WOOD_SWORD=24,STONE_SWORD=25,IRON_SWORD=26,GOLD_SWORD=27,DIAM_SWORD=28,
      WOOD_PICK=29,STONE_PICK=30,IRON_PICK=31,GOLD_PICK=32,DIAM_PICK=33,
      BOW=34,COOKED_PORK=35,COOKED_BEEF=36,COOKED_CHICKEN=37,COOKED_FISH=38;

const HARDNESS = [0,4,3,14,10,2,3,0,99,14,18,24,32,4,16,6,1,99,99,99,99,99,99,99,99,99,99,99,99,99,99,99,99,99,99,99,99,99,99];
const NAMES = [
  '空氣','草地','泥土','石頭','原木','葉子','沙子','水','基岩',
  '煤礦石','鐵礦石','金礦石','鑽石礦','木板','磚塊','玻璃','火把',
  '生豬肉','生牛肉','生雞肉','生魚','腐肉','骨頭','箭',
  '木劍','石劍','鐵劍','金劍','鑽石劍',
  '木鎬','石鎬','鐵鎬','金鎬','鑽石鎬',
  '弓','烤豬肉','烤牛肉','烤雞肉','烤魚'
];

const EMOJIS = {
  [GRASS]:'🟩',[DIRT]:'🟫',[STONE]:'⬜',[WOOD]:'🪵',[LEAVES]:'🌿',
  [SAND]:'🟨',[WATER]:'💧',[BED]:'⬛',[COAL]:'⬛',[IRON]:'⬛',
  [GOLD]:'⬛',[DIAM]:'⬛',[PLANK]:'🪵',[BRICK]:'🧱',[GLASS]:'🪟',
  [TORCH]:'🔥',[PORK]:'🥩',[BEEF]:'🥩',[CHICKEN]:'🍗',[FISH]:'🐟',
  [ROTTEN]:'🟫',[BONE]:'🦴',[ARROW]:'🏹',
  [WOOD_SWORD]:'🗡️',[STONE_SWORD]:'🗡️',[IRON_SWORD]:'⚔️',[GOLD_SWORD]:'⚔️',[DIAM_SWORD]:'💎',
  [WOOD_PICK]:'⛏️',[STONE_PICK]:'⛏️',[IRON_PICK]:'⛏️',[GOLD_PICK]:'⛏️',[DIAM_PICK]:'⛏️',
  [BOW]:'🏹',[COOKED_PORK]:'🍖',[COOKED_BEEF]:'🍖',[COOKED_CHICKEN]:'🍗',[COOKED_FISH]:'🍣'
};

const FOOD_VALUE = {
  [PORK]:3,[BEEF]:3,[CHICKEN]:2,[FISH]:2,[COOKED_PORK]:8,[COOKED_BEEF]:8,[COOKED_CHICKEN]:6,[COOKED_FISH]:5,[ROTTEN]:4
};
const POISON_CHANCE = { [ROTTEN]: 0.3 };

const TOOL_POWER = {
  [WOOD_SWORD]:2,[STONE_SWORD]:3,[IRON_SWORD]:4,[GOLD_SWORD]:3,[DIAM_SWORD]:6,
  [WOOD_PICK]:2,[STONE_PICK]:3,[IRON_PICK]:4,[GOLD_PICK]:3,[DIAM_PICK]:6,
  [BOW]:3
};

const BC = {
  [GRASS]: ['#4a9b2a','#5aba32','#7a5230'],
  [DIRT]:  ['#7a5230','#8a6240',null],
  [STONE]: ['#787878','#888888',null],
  [WOOD]:  ['#5a3a1a','#6b4626','#8a6236'],
  [LEAVES]:['#2a6a1a','#348a22',null],
  [SAND]:  ['#c8b460','#d8c470',null],
  [WATER]: ['#1878cc','#2090ee',null],
  [BED]:   ['#2a2a2a','#383838',null],
  [COAL]:  ['#787878','#888888','#1a1a1a'],
  [IRON]:  ['#787878','#888888','#d4885a'],
  [GOLD]:  ['#787878','#888888','#FFD700'],
  [DIAM]:  ['#787878','#888888','#5dddff'],
  [PLANK]: ['#b8843a','#c89448','#9a7030'],
  [BRICK]: ['#9a3c2c','#b04838','#7a2c20'],
  [GLASS]: ['#a8d8f0','#c0e8ff',null],
  [TORCH]: ['#a05a10','#c07a20','#ff8c00'],
};

function isSolid(b){ return b!==AIR && b!==WATER && b!==TORCH; }

// ─── Recipes ──────────────────────────────────────────────────────────────────
const RECIPES = [
  { result: WOOD_SWORD, count: 1, grid: [PLANK,PLANK,0, 0,WOOD,0, 0,0,0], name: '木劍' },
  { result: STONE_SWORD, count: 1, grid: [STONE,STONE,0, 0,WOOD,0, 0,0,0], name: '石劍' },
  { result: IRON_SWORD, count: 1, grid: [IRON,IRON,0, 0,WOOD,0, 0,0,0], name: '鐵劍' },
  { result: GOLD_SWORD, count: 1, grid: [GOLD,GOLD,0, 0,WOOD,0, 0,0,0], name: '金劍' },
  { result: DIAM_SWORD, count: 1, grid: [DIAM,DIAM,0, 0,WOOD,0, 0,0,0], name: '鑽石劍' },
  { result: WOOD_PICK, count: 1, grid: [PLANK,PLANK,PLANK, 0,WOOD,0, 0,WOOD,0], name: '木鎬' },
  { result: STONE_PICK, count: 1, grid: [STONE,STONE,STONE, 0,WOOD,0, 0,WOOD,0], name: '石鎬' },
  { result: IRON_PICK, count: 1, grid: [IRON,IRON,IRON, 0,WOOD,0, 0,WOOD,0], name: '鐵鎬' },
  { result: GOLD_PICK, count: 1, grid: [GOLD,GOLD,GOLD, 0,WOOD,0, 0,WOOD,0], name: '金鎬' },
  { result: DIAM_PICK, count: 1, grid: [DIAM,DIAM,DIAM, 0,WOOD,0, 0,WOOD,0], name: '鑽石鎬' },
  { result: BOW, count: 1, grid: [WOOD,0,WOOD, WOOD,0,WOOD, 0,WOOD,0], name: '弓' },
  { result: PLANK, count: 4, grid: [0,0,0, 0,WOOD,0, 0,0,0], name: '木板' },
  { result: COOKED_PORK, count: 1, grid: [0,0,0, 0,PORK,0, 0,0,0], name: '烤豬肉' },
  { result: COOKED_BEEF, count: 1, grid: [0,0,0, 0,BEEF,0, 0,0,0], name: '烤牛肉' },
  { result: COOKED_CHICKEN, count: 1, grid: [0,0,0, 0,CHICKEN,0, 0,0,0], name: '烤雞肉' },
  { result: COOKED_FISH, count: 1, grid: [0,0,0, 0,FISH,0, 0,0,0], name: '烤魚' },
  { result: ARROW, count: 4, grid: [0,0,0, 0,WOOD,0, 0,0,0], name: '箭' },
];


// ─── World ────────────────────────────────────────────────────────────────────
let world = new Uint8Array(WW*WH);
function gb(x,y){ if(x<0||x>=WW||y<0||y>=WH) return BED; return world[y*WW+x]; }
function sb(x,y,v){ if(x<0||x>=WW||y<0||y>=WH) return; world[y*WW+x]=v; }

function sn(x,seed){ const v=Math.sin(x*0.37+seed*127.1)*43758.5453; return v-Math.floor(v); }
function sm(x,seed){ const i=Math.floor(x),f=x-i,t=f*f*(3-2*f); return sn(i,seed)*(1-t)+sn(i+1,seed)*t; }
function on(x,seed){
  let v=0,a=1,f=1,m=0;
  for(let i=0;i<4;i++){ v+=sm(x*f,seed+i*31.4)*a; m+=a; a*=0.5; f*=2; }
  return v/m;
}

let surf;
let daySpeed = 0.8;

function genWorld(){
  surf = new Int32Array(WW);
  for(let x=0;x<WW;x++){
    surf[x] = Math.floor(WH*0.45 + on(x/60,0)*18 + on(x/20,17)*6 - 10);
    surf[x] = Math.max(20, Math.min(WH-20, surf[x]));
  }

  // 生成河流路徑
  let rivers = [];
  for(let r=0;r<3;r++){
    let rx = Math.floor(Math.random()*(WW-40))+20;
    let ry = surf[rx];
    let river = [];
    for(let step=0;step<80;step++){
      river.push({x:rx, y:ry});
      rx += Math.floor(Math.random()*3)-1;
      if(rx<5 || rx>=WW-5) break;
      ry = surf[rx];
    }
    rivers.push(river);
  }

  for(let x=0;x<WW;x++){
    const sh = surf[x];
    for(let y=0;y<WH;y++){
      if(y>=WH-1){ sb(x,y,BED); continue; }
      if(y<sh){ continue; }

      let inRiver = false;
      for(const river of rivers){
        for(const pt of river){
          const dx = x - pt.x;
          const dy = y - pt.y;
          if(Math.abs(dx) <= 2 && Math.abs(dy) <= 1 && y >= sh-1 && y <= sh+3){
            inRiver = true;
            break;
          }
        }
        if(inRiver) break;
      }

      if(inRiver){
        sb(x,y,WATER);
        continue;
      }

      if(y===sh){
        const bio = on(x/70,55);
        sb(x,y, bio>0.65?SAND:GRASS);
      } else if(y<sh+5){
        const bio = on(x/70,55);
        sb(x,y, bio>0.65?SAND:DIRT);
      } else {
        const cv = on(x/12,77)*on(x/8,33) + on(y/10,99)*on(y/7,44);
        if(cv > 0.52 && y>sh+8){ sb(x,y,AIR); continue; }

        const dep = y-sh;
        const r = sn(x*3.1+y*7.3,42);
        if(dep>52 && r<0.012) sb(x,y,DIAM);
        else if(dep>32 && r<0.025) sb(x,y,GOLD);
        else if(dep>16 && r<0.045) sb(x,y,IRON);
        else if(r<0.07) sb(x,y,COAL);
        else sb(x,y,STONE);
      }
    }
  }

  // 讓水往下流
  for(let flow=0;flow<20;flow++){
    for(let x=0;x<WW;x++){
      for(let y=WH-2;y>=0;y--){
        if(gb(x,y)===WATER){
          if(y+1<WH && gb(x,y+1)===AIR) sb(x,y+1,WATER);
          if(x+1<WW && gb(x+1,y)===AIR) sb(x+1,y,WATER);
          if(x-1>=0 && gb(x-1,y)===AIR) sb(x-1,y,WATER);
        }
      }
    }
  }

  // Trees
  for(let x=5;x<WW-5;x++){
    if(Math.random()<0.055 && gb(x,surf[x])===GRASS){
      placeTree(x,surf[x]);
    }
  }
}

function placeTree(x,base){
  const h = 4+Math.floor(Math.random()*3);
  for(let i=1;i<=h;i++) sb(x,base-i,WOOD);
  for(let dx=-2;dx<=2;dx++){
    for(let dy=-2;dy<=0;dy++){
      if(Math.abs(dx)+Math.abs(dy)<=3){
        const lx=x+dx, ly=base-h+1+dy;
        if(gb(lx,ly)===AIR) sb(lx,ly,LEAVES);
      }
    }
  }
  sb(x,base-h-1,LEAVES);
}

// ─── Entities ─────────────────────────────────────────────────────────────────
class Entity {
  constructor(x,y,type){
    this.x=x; this.y=y; this.type=type;
    this.vx=0; this.vy=0;
    this.w=TS*0.8; this.h=TS*0.8;
    this.hp=10; this.maxHp=10;
    this.dead=false;
    this.face=1;
    this.anim=0;
    this.state='idle';
    this.attackCD=0;
    this.target=null;
    this.onGround=false;
  }

  checkCollision(){
    const x0 = Math.floor(this.x / TS);
    const x1 = Math.floor((this.x + this.w - 0.1) / TS);
    const y0 = Math.floor(this.y / TS);
    const y1 = Math.floor((this.y + this.h - 0.1) / TS);

    if(isSolid(gb(x0, y1+1)) || isSolid(gb(x1, y1+1))){
      this.onGround = true;
      this.y = (y1+1) * TS - this.h - 0.01;
      this.vy = 0;
    } else {
      this.onGround = false;
    }

    if(isSolid(gb(x0, y0)) || isSolid(gb(x1, y0))){
      this.y = (y0 + 1) * TS + 0.01;
      this.vy = 0;
    }

    if(this.vx > 0){
      if(isSolid(gb(x1+1, y0)) || isSolid(gb(x1+1, y1))){
        this.x = (x1+1) * TS - this.w - 0.01;
        this.vx = 0;
      }
    }
    if(this.vx < 0){
      if(isSolid(gb(x0-1, y0)) || isSolid(gb(x0-1, y1))){
        this.x = x0 * TS + 0.01;
        this.vx = 0;
      }
    }

    this.x = Math.max(0, Math.min(WW*TS - this.w, this.x));
    this.y = Math.max(0, Math.min(WH*TS - this.h, this.y));
  }

  update(){
    if(this.dead) return;
    this.anim++;
    if(this.attackCD>0) this.attackCD--;

    const dx = pl.x - this.x;
    const dy = pl.y - this.y;
    const dist = Math.hypot(dx, dy);

    if(this.type==='zombie' || this.type==='skeleton'){
      if(!isNight()){
        this.hp -= 0.5;
        if(this.hp <= 0){ this.dead = true; return; }
        this.state='idle';
        this.vx*=0.8;
        this.vy += GRAV * 0.5;
        this.y += this.vy;
        this.checkCollision();
        return;
      }

      if(dist < 15*TS && dist > TS*0.8){
        this.state='chase';
        this.face = dx > 0 ? 1 : -1;
        this.vx = this.face * (this.type==='zombie'?2.0:1.8);

        const tx = Math.floor((this.x + this.face * this.w) / TS);
        const ty = Math.floor(this.y / TS);
        const ty2 = Math.floor((this.y + this.h * 0.5) / TS);
        if(isSolid(gb(tx, ty)) || isSolid(gb(tx, ty2))){
          if(this.onGround) this.vy = JUMP * 0.7;
        }
      } else if(dist <= TS*1.2 && this.attackCD<=0){
        this.state='attack';
        this.attackCD = 35;

        if(this.type==='skeleton'){
          const angle = Math.atan2(pl.y - this.y, pl.x - this.x);
          projectiles.push(new Projectile(
            this.x+this.w/2, this.y+this.h/2,
            Math.cos(angle)*6, Math.sin(angle)*6,
            'skeleton_arrow', 3
          ));
        } else {
          pl.hp -= 4;
          pl.hunger = Math.max(0, pl.hunger - 2);
          pl.vx = (pl.x - this.x) > 0 ? 5 : -5;
          pl.vy = -3;
          showMsg('殭屍咬了你! -4HP');
          if(pl.hp <= 0) die('被殭屍咬死了');
        }
      } else {
        this.state='idle';
        this.vx*=0.8;
      }
    } else if(this.type==='pig' || this.type==='cow' || this.type==='chicken'){
      if(Math.random()<0.02){
        this.face = Math.random()>0.5?1:-1;
        this.vx = this.face * (this.type==='chicken'?1.5:0.8);
      }
      if(Math.random()<0.01 && this.onGround){
        this.vy = JUMP * 0.5;
      }
      if(dist < 6*TS){
        this.face = dx > 0 ? -1 : 1;
        this.vx = this.face * 3.0;
      }
    } else if(this.type==='fish'){
      if(Math.random()<0.05){
        this.vx = (Math.random()-0.5)*2.5;
        this.vy = (Math.random()-0.5)*1.5;
      }
      const tx = Math.floor(this.x/TS), ty = Math.floor(this.y/TS);
      if(gb(tx,ty)!==WATER){
        this.vy = -1.5;
        this.vx *= 0.5;
      }
    }

    this.vy += GRAV * 0.5;
    if(this.vy > 12) this.vy = 12;

    this.x += this.vx;
    this.y += this.vy;

    this.checkCollision();
  }

  draw(){
    if(this.dead) return;
    const sx = Math.round(this.x - cam.x);
    const sy = Math.round(this.y - cam.y);
    if(sx < -50 || sx > W+50 || sy < -50 || sy > H+50) return;

    cx.save();
    cx.translate(sx+this.w/2, sy+this.h/2);
    if(this.face<0) cx.scale(-1,1);

    if(this.type==='zombie'){
      cx.fillStyle='#2d5a1a';
      cx.fillRect(-this.w/2, -this.h/2, this.w, this.h);
      cx.fillStyle='#1a3a0a';
      cx.fillRect(-this.w/2+2, -this.h/2+2, this.w-4, this.h*0.3);
      cx.fillStyle='#ff0000';
      cx.fillRect(-this.w/4, -this.h/3, 4, 4);
      cx.fillRect(this.w/8, -this.h/3, 4, 4);
      const armSwing = Math.sin(this.anim*0.1)*5;
      cx.fillStyle='#2d5a1a';
      cx.fillRect(-this.w/2-4, -this.h/4+armSwing, 6, this.h*0.4);
      cx.fillRect(this.w/2-2, -this.h/4-armSwing, 6, this.h*0.4);
      if(this.state==='attack'){
        cx.fillStyle='#3a6a2a';
        cx.fillRect(this.w/2, -this.h/4, 12, 6);
      }
    } else if(this.type==='skeleton'){
      cx.fillStyle='#e8e0d0';
      cx.fillRect(-this.w/2, -this.h/2, this.w, this.h);
      cx.fillStyle='#f0e8d8';
      cx.fillRect(-this.w/2+2, -this.h/2+2, this.w-4, this.h*0.35);
      cx.fillStyle='#1a1a1a';
      cx.fillRect(-this.w/4, -this.h/3, 5, 5);
      cx.fillRect(this.w/8, -this.h/3, 5, 5);
      cx.strokeStyle='#8B4513';
      cx.lineWidth=2;
      cx.beginPath();
      cx.arc(this.w/2, -this.h/4, 8, -Math.PI/2, Math.PI/2);
      cx.stroke();
      cx.strokeStyle='#888';
      cx.beginPath();
      cx.moveTo(this.w/2+5, -this.h/4-5);
      cx.lineTo(this.w/2+15, -this.h/4);
      cx.lineTo(this.w/2+5, -this.h/4+5);
      cx.stroke();
    } else if(this.type==='pig'){
      cx.fillStyle='#f4a4a4';
      cx.fillRect(-this.w/2, -this.h/2, this.w, this.h*0.7);
      cx.fillRect(-this.w/2, -this.h/2-4, this.w*0.5, this.h*0.4);
      cx.fillStyle='#e08080';
      cx.fillRect(-this.w/2-2, -this.h/3, 6, 6);
      cx.fillStyle='#1a1a1a';
      cx.fillRect(-this.w/4, -this.h/2-2, 3, 3);
      const legSwing = Math.sin(this.anim*0.15)*3;
      cx.fillStyle='#f4a4a4';
      cx.fillRect(-this.w/3, this.h*0.2+legSwing, 5, this.h*0.3);
      cx.fillRect(this.w/6, this.h*0.2-legSwing, 5, this.h*0.3);
    } else if(this.type==='cow'){
      cx.fillStyle='#8B4513';
      cx.fillRect(-this.w/2, -this.h/2, this.w, this.h*0.7);
      cx.fillStyle='#f5f5dc';
      cx.fillRect(-this.w/4, -this.h/4, this.w*0.3, this.h*0.25);
      cx.fillRect(this.w/6, -this.h/6, this.w*0.2, this.h*0.2);
      cx.fillStyle='#8B4513';
      cx.fillRect(-this.w/2, -this.h/2-6, this.w*0.45, this.h*0.45);
      cx.fillStyle='#ddd';
      cx.fillRect(-this.w/2-3, -this.h/2-8, 4, 6);
      cx.fillStyle='#1a1a1a';
      cx.fillRect(-this.w/4, -this.h/2-2, 3, 3);
      const legSwing = Math.sin(this.anim*0.1)*2;
      cx.fillStyle='#8B4513';
      cx.fillRect(-this.w/3, this.h*0.2+legSwing, 5, this.h*0.3);
      cx.fillRect(this.w/6, this.h*0.2-legSwing, 5, this.h*0.3);
    } else if(this.type==='chicken'){
      cx.fillStyle='#fff';
      cx.fillRect(-this.w/2, -this.h/2, this.w, this.h*0.6);
      cx.fillRect(-this.w/2, -this.h/2-6, this.w*0.35, this.h*0.35);
      cx.fillStyle='#ff0000';
      cx.fillRect(-this.w/2+2, -this.h/2-10, 6, 4);
      cx.fillStyle='#ffaa00';
      cx.fillRect(-this.w/2-4, -this.h/3, 5, 4);
      cx.fillStyle='#1a1a1a';
      cx.fillRect(-this.w/4, -this.h/2-2, 2, 2);
      const wingFlap = Math.sin(this.anim*0.3)*8;
      cx.fillStyle='#f0f0f0';
      cx.fillRect(-this.w/2-3, -this.h/4+wingFlap, 4, this.h*0.25);
      cx.fillStyle='#ffaa00';
      cx.fillRect(-this.w/4, this.h*0.1, 3, this.h*0.3);
    } else if(this.type==='fish'){
      cx.fillStyle='#4a90d9';
      cx.fillRect(-this.w/2, -this.h/2, this.w, this.h*0.5);
      const tailWag = Math.sin(this.anim*0.2)*4;
      cx.fillRect(this.w/2-2, -this.h/4+tailWag, 6, this.h*0.3);
      cx.fillStyle='#1a1a1a';
      cx.fillRect(-this.w/3, -this.h/3, 3, 3);
      cx.fillStyle='#3a80c9';
      cx.fillRect(-this.w/4, -this.h/2-2, 4, 3);
    }

    if(this.hp < this.maxHp){
      cx.fillStyle='#333';
      cx.fillRect(-this.w/2, -this.h/2-10, this.w, 4);
      cx.fillStyle='#e74c3c';
      cx.fillRect(-this.w/2, -this.h/2-10, this.w*(this.hp/this.maxHp), 4);
    }

    cx.restore();
  }

  takeDamage(dmg){
    this.hp -= dmg;
    if(this.hp <= 0){
      this.dead = true;
      this.dropLoot();
    }
  }

  dropLoot(){
    const tx = Math.floor((this.x+this.w/2)/TS);
    const ty = Math.floor((this.y+this.h/2)/TS);

    if(this.type==='zombie'){
      inventory[ROTTEN] = (inventory[ROTTEN]||0) + 1;
      showMsg('☠ 殭屍掉落了 腐肉!');
      spawnParticles(tx, ty, ROTTEN);
    } else if(this.type==='skeleton'){
      inventory[BONE] = (inventory[BONE]||0) + (Math.random()>0.5?2:1);
      inventory[ARROW] = (inventory[ARROW]||0) + (Math.random()>0.5?2:1);
      showMsg('💀 骷髏掉落了 骨頭和箭!');
      spawnParticles(tx, ty, BONE);
    } else if(this.type==='pig'){
      inventory[PORK] = (inventory[PORK]||0) + (Math.random()>0.3?2:1);
      showMsg('🐷 豬掉落了 生豬肉!');
      spawnParticles(tx, ty, PORK);
    } else if(this.type==='cow'){
      inventory[BEEF] = (inventory[BEEF]||0) + (Math.random()>0.3?2:1);
      showMsg('🐄 牛掉落了 生牛肉!');
      spawnParticles(tx, ty, BEEF);
    } else if(this.type==='chicken'){
      inventory[CHICKEN] = (inventory[CHICKEN]||0) + 1;
      showMsg('🐔 雞掉落了 生雞肉!');
      spawnParticles(tx, ty, CHICKEN);
    } else if(this.type==='fish'){
      inventory[FISH] = (inventory[FISH]||0) + 1;
      showMsg('🐟 魚掉落了 生魚!');
      spawnParticles(tx, ty, FISH);
    }
    score += 10;
  }
}

class Projectile {
  constructor(x,y,vx,vy,type,dmg){
    this.x=x; this.y=y; this.vx=vx; this.vy=vy;
    this.type=type; this.dmg=dmg; this.life=120; this.dead=false;
  }
  update(){
    this.x += this.vx; this.y += this.vy;
    this.life--;
    if(this.life<=0) this.dead=true;

    const tx = Math.floor(this.x/TS), ty = Math.floor(this.y/TS);
    if(isSolid(gb(tx,ty))) this.dead=true;

    if(this.type==='skeleton_arrow'){
      if(Math.abs(this.x-(pl.x+pl.w/2))<TS && Math.abs(this.y-(pl.y+pl.h/2))<TS){
        pl.hp -= this.dmg;
        pl.hunger = Math.max(0, pl.hunger - 0.5);
        this.dead = true;
        showMsg('🏹 被箭射中了! -'+this.dmg+'HP');
        if(pl.hp <= 0) die('被骷髏的箭射死了');
      }
    } else if(this.type==='player_arrow'){
      for(const e of entities){
        if(!e.dead && (e.type==='zombie' || e.type==='skeleton')){
          if(Math.abs(this.x-(e.x+e.w/2))<e.w && Math.abs(this.y-(e.y+e.h/2))<e.h){
            e.takeDamage(this.dmg);
            this.dead = true;
            score += 5;
            showMsg('🏹 擊中了 '+e.type+'! -'+this.dmg+'HP');
            break;
          }
        }
      }
    }
  }
  draw(){
    if(this.dead) return;
    const sx = Math.round(this.x - cam.x);
    const sy = Math.round(this.y - cam.y);
    cx.save();
    cx.translate(sx, sy);
    cx.rotate(Math.atan2(this.vy, this.vx));
    cx.fillStyle = this.type==='skeleton_arrow' ? '#888' : '#4a90d9';
    cx.fillRect(-8, -1, 16, 2);
    cx.fillStyle = this.type==='skeleton_arrow' ? '#aaa' : '#6ab0f9';
    cx.fillRect(4, -3, 4, 6);
    cx.restore();
  }
}

let entities = [];
let projectiles = [];
let score = 0;

function spawnEntities(){
  entities = [];

  // 修正：在玩家畫面附近生成動物，確保玩家能看到
  const spawnX = Math.floor(pl.x / TS);
  const spawnY = surf[spawnX];

  // 在玩家左右各生成動物
  const nearbyPositions = [];
  for(let i=-8; i<=8; i++){
    const x = spawnX + i;
    if(x >= 5 && x < WW-5){
      const y = surf[x];
      if(gb(x, y) === GRASS){
        nearbyPositions.push({x: x*TS, y: (y-2)*TS});
      }
    }
  }

  // 在附近位置生成動物
  let animalCount = 0;
  for(const pos of nearbyPositions){
    if(animalCount >= 15) break;
    if(Math.random() < 0.4){
      const r = Math.random();
      if(r<0.35) entities.push(new Entity(pos.x, pos.y, 'pig'));
      else if(r<0.65) entities.push(new Entity(pos.x, pos.y, 'cow'));
      else entities.push(new Entity(pos.x, pos.y, 'chicken'));
      animalCount++;
    }
  }

  // 在更遠的地方也生成一些
  for(let i=0;i<25;i++){
    const offset = (Math.random() - 0.5) * 80;
    const x = Math.max(10, Math.min(WW-10, Math.floor(spawnX + offset)));
    const y = surf[x];
    if(gb(x, y) !== GRASS) continue;

    const r = Math.random();
    if(r<0.35) entities.push(new Entity(x*TS, (y-2)*TS, 'pig'));
    else if(r<0.65) entities.push(new Entity(x*TS, (y-2)*TS, 'cow'));
    else entities.push(new Entity(x*TS, (y-2)*TS, 'chicken'));
  }

  // 生成魚
  let fishCount = 0;
  for(let x=0;x<WW;x++){
    for(let y=0;y<WH;y++){
      if(gb(x,y)===WATER && Math.random()<0.04 && fishCount<50){
        entities.push(new Entity(x*TS+TS/2, y*TS+TS/2, 'fish'));
        fishCount++;
      }
    }
  }

  showMsg('🐷 附近發現了 '+animalCount+' 隻動物!');
  showMsg('🐟 水中發現了 '+fishCount+' 條魚!');
}

function spawnMonsters(){
  if(!isNight()) return;
  const spawnCount = Math.floor(Math.random()*3)+2;
  for(let i=0;i<spawnCount;i++){
    const side = Math.random()>0.5?1:-1;
    const x = Math.max(5, Math.min(WW-5, Math.floor(pl.x/TS) + side*(12+Math.floor(Math.random()*15))));
    const y = surf[x] - 2;
    if(Math.random()>0.5){
      entities.push(new Entity(x*TS, y*TS, 'zombie'));
      showMsg('⚠️ 殭屍出現了!');
    } else {
      entities.push(new Entity(x*TS, y*TS, 'skeleton'));
      showMsg('⚠️ 骷髏出現了!');
    }
  }
}

function showMsg(text){
  const area = document.getElementById('msg-area');
  const msg = document.createElement('div');
  msg.className = 'msg';
  msg.textContent = text;
  area.appendChild(msg);
  setTimeout(()=>msg.remove(), 3000);
}


// ─── Player ───────────────────────────────────────────────────────────────────
const pl = { x:0,y:0,vx:0,vy:0,w:TS*0.75,h:TS*1.85,onGround:false,
             face:1,wf:0,wt:0,hp:20,maxHp:20,hunger:20,maxHunger:20,
             inv:0,poisonTimer:0,attackCD:0,arrowCD:0 };
const cam = { x:0,y:0 };
const keys = {};
let mx=0,my=0,mleft=false;
// 修正：初始快捷欄使用可放置方塊，所有欄位都可以放任何物品
const hotbar = [GRASS,DIRT,STONE,WOOD,PLANK,SAND,GLASS,TORCH];
let slot = 0;
let breaking = null;
let placeCD = 0;
const inventory = {};
let particles = [];
let dayTime = 6200;
let lastMonsterSpawn = 0;
let craftingOpen = false;

// ─── Physics ──────────────────────────────────────────────────────────────────
function collideV(){
  const x0=Math.floor(pl.x/TS), x1=Math.floor((pl.x+pl.w-1)/TS);
  if(pl.vy>0){
    const y1=Math.floor((pl.y+pl.h)/TS);
    if(isSolid(gb(x0,y1))||isSolid(gb(x1,y1))){
      pl.y=y1*TS-pl.h; pl.vy=0; pl.onGround=true;
    }
  } else if(pl.vy<0){
    const y0=Math.floor(pl.y/TS);
    if(isSolid(gb(x0,y0))||isSolid(gb(x1,y0))){
      pl.y=(y0+1)*TS; pl.vy=0;
    }
  }
}
function collideH(){
  const y0=Math.floor((pl.y+2)/TS), y1=Math.floor((pl.y+pl.h-2)/TS);
  if(pl.vx>0){
    const x1=Math.floor((pl.x+pl.w)/TS);
    if(isSolid(gb(x1,y0))||isSolid(gb(x1,y1))){ pl.x=x1*TS-pl.w; pl.vx=0; }
  } else if(pl.vx<0){
    const x0=Math.floor(pl.x/TS);
    if(isSolid(gb(x0,y0))||isSolid(gb(x0,y1))){ pl.x=(x0+1)*TS; pl.vx=0; }
  }
}

// ─── Mouse tile ───────────────────────────────────────────────────────────────
function getTile(){ return { x:Math.floor((mx+cam.x)/TS), y:Math.floor((my+cam.y)/TS) }; }
function tileReach(tx,ty){ return Math.hypot(tx*TS+TS/2-(pl.x+pl.w/2), ty*TS+TS/2-(pl.y+pl.h/2)) < 5.5*TS; }

// ─── Update ───────────────────────────────────────────────────────────────────
function update(){
  if(craftingOpen) return;
  dayTime = (dayTime + daySpeed) % 24000;

  // 飢餓度下降
  if(pl.hunger > 0 && Math.random() < 0.001){
    pl.hunger -= 0.1;
  }
  if(pl.hunger <= 0){
    pl.hunger = 0;
    if(Math.random() < 0.02){
      pl.hp -= 1;
      if(pl.hp <= 0) die('餓死了');
    }
  }
  if(pl.poisonTimer > 0){
    pl.poisonTimer--;
    if(pl.poisonTimer % 40 === 0){
      pl.hp -= 1;
      if(pl.hp <= 0) die('中毒而死');
    }
  }

  // 怪物生成
  if(isNight() && dayTime - lastMonsterSpawn > 2000){
    spawnMonsters();
    lastMonsterSpawn = dayTime;
  }
  if(!isNight()){
    entities = entities.filter(e => e.type!=='zombie' && e.type!=='skeleton');
  }

  // Ground check
  pl.onGround = false;
  const cx0=Math.floor(pl.x/TS), cx1=Math.floor((pl.x+pl.w-1)/TS);
  const cyb=Math.floor((pl.y+pl.h)/TS);
  if(isSolid(gb(cx0,cyb))||isSolid(gb(cx1,cyb))) pl.onGround=true;

  // Move
  let mv=false;
  if(keys['ArrowLeft']||keys['a']||keys['A']){ pl.vx=-SPEED; pl.face=-1; mv=true; }
  else if(keys['ArrowRight']||keys['d']||keys['D']){ pl.vx=SPEED; pl.face=1; mv=true; }
  else { pl.vx*=0.65; if(Math.abs(pl.vx)<0.2) pl.vx=0; }

  if(mv&&pl.onGround){ pl.wt++; if(pl.wt>7){pl.wf=(pl.wf+1)%4;pl.wt=0;} }
  else if(!mv){ pl.wf=0; pl.wt=0; }

  if((keys[' ']||keys['w']||keys['W']||keys['ArrowUp'])&&pl.onGround){ pl.vy=JUMP; }

  pl.vy+=GRAV;
  if(pl.vy>18) pl.vy=18;

  pl.x+=pl.vx; collideH();
  pl.y+=pl.vy; collideV();

  pl.x=Math.max(0,Math.min(WW*TS-pl.w,pl.x));
  if(pl.y>WH*TS){ pl.y=(surf[Math.floor(pl.x/TS)]-3)*TS; pl.vy=0; }

  // Camera
  const tcx=pl.x+pl.w/2-W/2, tcy=pl.y+pl.h/2-H/2;
  cam.x+=(tcx-cam.x)*0.12;
  cam.y+=(tcy-cam.y)*0.12;
  cam.x=Math.max(0,Math.min(WW*TS-W,cam.x));
  cam.y=Math.max(0,Math.min(WH*TS-H,cam.y));

  // Attack entities with left click
  if(mleft && pl.attackCD <= 0){
    const t=getTile();
    let hitEntity = false;

    // 先檢查是否點擊到實體
    for(const e of entities){
      if(!e.dead && e.type!=='fish'){
        const ex = Math.floor(e.x/TS), ey = Math.floor(e.y/TS);
        if(t.x===ex && t.y===ey && tileReach(t.x,t.y)){
          let dmg = 2;
          const held = hotbar[slot];
          if(TOOL_POWER[held]) dmg = TOOL_POWER[held];
          if(held >= WOOD_SWORD && held <= DIAM_SWORD) dmg += 2;
          e.takeDamage(dmg);
          pl.attackCD = 15;
          hitEntity = true;
          score += 2;
          e.vx = (e.x - pl.x) > 0 ? 3 : -3;
          e.vy = -4;
          showMsg('擊中了 '+(e.type==='zombie'?'殭屍':e.type==='skeleton'?'骷髏':e.type)+'! -'+dmg+'HP');
          spawnParticles(t.x, t.y, e.type==='zombie'?ROTTEN:e.type==='skeleton'?BONE:WOOD);
          break;
        }
      }
    }

    // 修正：在水中點擊可以抓魚，放寬條件到3格內
    if(!hitEntity){
      const t=getTile();
      const b=gb(t.x,t.y);
      if(b===WATER && tileReach(t.x,t.y)){
        // 在3格範圍內找魚
        for(const e of entities){
          if(!e.dead && e.type==='fish'){
            const ex = Math.floor(e.x/TS), ey = Math.floor(e.y/TS);
            // 放寬到3格距離
            if(Math.abs(t.x-ex)<=3 && Math.abs(t.y-ey)<=3){
              e.takeDamage(5);
              pl.attackCD = 15;
              hitEntity = true;
              score += 2;
              showMsg('🐟 抓到了一條魚!');
              break;
            }
          }
        }
      }
    }

    if(!hitEntity){
      // Breaking blocks
      const b=gb(t.x,t.y);
      if(tileReach(t.x,t.y)&&b!==AIR&&b!==BED){
        if(!breaking||breaking.x!==t.x||breaking.y!==t.y){
          let maxHard = HARDNESS[b]||10;
          const held = hotbar[slot];
          if(held >= WOOD_PICK && held <= DIAM_PICK && (b===STONE||b===COAL||b===IRON||b===GOLD||b===DIAM)){
            maxHard = Math.max(1, maxHard - TOOL_POWER[held]*2);
          }
          breaking={x:t.x,y:t.y,p:0,max:maxHard};
        }
        breaking.p++;
        if(breaking.p>=breaking.max){
          if(b===WOOD) inventory[WOOD]=(inventory[WOOD]||0)+1;
          else if(b===LEAVES){
            if(Math.random()<0.1) inventory[WOOD]=(inventory[WOOD]||0)+1;
          }
          else if(b>=GRASS && b<=GLASS) inventory[b]=(inventory[b]||0)+1;
          else if(b>=COAL && b<=DIAM) inventory[b]=(inventory[b]||0)+1;

          spawnParticles(t.x,t.y,b);
          sb(t.x,t.y,AIR);
          breaking=null;
          score += 1;
        }
      } else { breaking=null; }
    }
  } else if(!mleft) { breaking=null; }

  if(pl.attackCD > 0) pl.attackCD--;
  if(pl.arrowCD > 0) pl.arrowCD--;

  if(placeCD>0) placeCD--;

  // Entities update
  for(const e of entities) e.update();
  entities = entities.filter(e => !e.dead);

  // Projectiles update
  for(const p of projectiles) p.update();
  projectiles = projectiles.filter(p => !p.dead);

  // Particles
  for(const p of particles){ p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.life--; }
  particles=particles.filter(p=>p.life>0);
}

function spawnParticles(tx,ty,b){
  const col=(BC[b]||['#888'])[0];
  for(let i=0;i<10;i++){
    particles.push({
      x:tx*TS+TS/2, y:ty*TS+TS/2,
      vx:(Math.random()-0.5)*6, vy:Math.random()*-5-1,
      life:25+Math.random()*20,
      color:col, sz:3+Math.random()*4
    });
  }
}

// ─── Draw block ───────────────────────────────────────────────────────────────
function drawBlock(b,bx,by,sz,bp,bmax){
  if(b===AIR) return;
  const d=BC[b]; if(!d) return;
  const [base,light,ore]=d;

  if(b===WATER){ cx.globalAlpha=0.72; }
  if(b===GLASS){ cx.globalAlpha=0.55; }

  cx.fillStyle=base;
  cx.fillRect(bx,by,sz,sz);

  cx.fillStyle=light;
  cx.fillRect(bx,by,sz,Math.ceil(sz*0.22));

  if(b===GRASS){
    cx.fillStyle='#7a5230';
    cx.fillRect(bx,by+Math.ceil(sz*0.22),sz,sz-Math.ceil(sz*0.22));
  }
  if(b===WOOD){
    cx.fillStyle=d[2]||'#8a6236';
    cx.fillRect(bx+sz*0.3,by,sz*0.4,sz);
  }
  if(b===PLANK){
    cx.fillStyle=d[2]||'#9a7030';
    cx.fillRect(bx,by+sz*0.48,sz,2);
    cx.fillRect(bx+sz*0.5-1,by,2,sz*0.48);
  }
  if(b===BRICK){
    cx.fillStyle=d[2]||'#7a2c20';
    cx.fillRect(bx,by+sz*0.5,sz,2);
    cx.fillRect(bx+sz*0.25,by,2,sz*0.5);
    cx.fillRect(bx+sz*0.75,by+sz*0.5+2,2,sz*0.5-2);
  }
  if(b===TORCH){
    cx.fillStyle='#ff8c00';
    cx.fillRect(bx+sz*0.4,by,sz*0.2,sz*0.35);
    cx.fillStyle='#ffee00';
    cx.fillRect(bx+sz*0.43,by+sz*0.05,sz*0.14,sz*0.2);
  }
  if(ore){
    cx.fillStyle=ore;
    const spots=[[0.15,0.2],[0.55,0.15],[0.65,0.55],[0.2,0.65],[0.4,0.4]];
    for(const[sx,sy] of spots){
      cx.fillRect(bx+sx*sz,by+sy*sz,sz*0.13,sz*0.13);
    }
  }

  cx.globalAlpha=1;
  cx.strokeStyle='rgba(0,0,0,0.22)';
  cx.lineWidth=0.5;
  cx.strokeRect(bx+0.5,by+0.5,sz-1,sz-1);

  if(bp>0&&bmax>0){
    const prog=bp/bmax;
    cx.fillStyle=`rgba(0,0,0,${prog*0.65})`;
    cx.fillRect(bx,by,sz,sz);
    cx.strokeStyle=`rgba(255,255,255,${prog*0.9})`;
    cx.lineWidth=1;
    if(prog>0.2){ line(cx,bx+sz*0.3,by,bx+sz*0.1,by+sz*0.55); }
    if(prog>0.4){ line(cx,bx+sz*0.55,by,bx+sz*0.8,by+sz*0.6); }
    if(prog>0.6){ line(cx,bx,by+sz*0.35,bx+sz,by+sz*0.65); }
    if(prog>0.8){ line(cx,bx+sz*0.2,by,bx+sz*0.4,by+sz); }
  }
}
function line(c,x1,y1,x2,y2){ c.beginPath();c.moveTo(x1,y1);c.lineTo(x2,y2);c.stroke(); }


// ─── Draw player ─────────────────────────────────────────────────────────────
function drawPlayer(){
  const x=Math.round(pl.x-cam.x), y=Math.round(pl.y-cam.y);
  const w=pl.w, h=pl.h, f=pl.face;
  const leg=pl.onGround?Math.sin(pl.wf*Math.PI/2)*0.3:0;

  cx.fillStyle='rgba(0,0,0,0.25)';
  cx.beginPath();
  cx.ellipse(x+w/2,y+h+2,w*0.55,4,0,0,Math.PI*2);
  cx.fill();

  cx.fillStyle='#2a4a7a';
  cx.save(); cx.translate(x+w*0.27,y+h*0.73); cx.rotate(leg);
  cx.fillRect(-w*0.17,0,w*0.32,h*0.27); cx.restore();
  cx.save(); cx.translate(x+w*0.67,y+h*0.73); cx.rotate(-leg);
  cx.fillRect(-w*0.15,0,w*0.32,h*0.27); cx.restore();

  cx.fillStyle='#3a72d0';
  cx.fillRect(x+w*0.08,y+h*0.38,w*0.84,h*0.37);

  cx.fillStyle='#e8a070';
  if(mleft){
    const sw=Math.sin(Date.now()*0.022)*0.6;
    cx.save(); cx.translate(x+(f>0?w*0.92:w*0.08),y+h*0.4);
    cx.rotate(f*(0.6+sw));
    cx.fillRect(-w*0.1,0,w*0.2,h*0.3); cx.restore();
  } else {
    cx.fillRect(x+(f>0?w*0.82:w*0.02),y+h*0.4,w*0.16,h*0.3);
  }
  cx.fillRect(x+(f>0?w*0.02:w*0.82),y+h*0.4,w*0.16,h*0.3);

  cx.fillStyle='#e8a070';
  cx.fillRect(x+w*0.12,y,w*0.76,h*0.37);

  cx.fillStyle='#3a2008';
  cx.fillRect(x+w*0.12,y,w*0.76,h*0.1);
  cx.fillRect(x+w*0.12,y,w*0.1,h*0.22);
  if(f<0) cx.fillRect(x+w*0.78,y,w*0.1,h*0.22);

  cx.fillStyle='#1a1a1a';
  if(f>0){
    cx.fillRect(x+w*0.52,y+h*0.1,w*0.16,h*0.1);
    cx.fillRect(x+w*0.72,y+h*0.1,w*0.06,h*0.1);
  } else {
    cx.fillRect(x+w*0.22,y+h*0.1,w*0.06,h*0.1);
    cx.fillRect(x+w*0.32,y+h*0.1,w*0.16,h*0.1);
  }

  cx.fillStyle='#c0705a';
  cx.fillRect(x+w*0.3,y+h*0.26,w*0.4,h*0.05);

  // 顯示手持物品
  const hb = hotbar[slot];
  if(hb && hb !== AIR){
    const heldX = f > 0 ? x + w + 2 : x - TS - 2;
    const heldY = y + h * 0.45;

    if(hb >= WOOD_SWORD && hb <= DIAM_SWORD) {
      cx.fillStyle = hb === WOOD_SWORD ? '#8B4513' : hb === STONE_SWORD ? '#888' : 
                     hb === IRON_SWORD ? '#aaa' : hb === GOLD_SWORD ? '#FFD700' : '#5dddff';
      cx.fillRect(heldX, heldY, TS*0.8, TS*0.2);
      cx.fillRect(heldX + TS*0.3, heldY - TS*0.6, TS*0.2, TS*0.8);
    } else if(hb >= WOOD_PICK && hb <= DIAM_PICK) {
      cx.fillStyle = hb === WOOD_PICK ? '#8B4513' : hb === STONE_PICK ? '#888' : 
                     hb === IRON_PICK ? '#aaa' : hb === GOLD_PICK ? '#FFD700' : '#5dddff';
      cx.fillRect(heldX, heldY, TS*0.8, TS*0.15);
      cx.fillRect(heldX + TS*0.1, heldY - TS*0.5, TS*0.6, TS*0.3);
      cx.fillRect(heldX + TS*0.35, heldY - TS*0.2, TS*0.1, TS*0.2);
    } else if(hb === BOW) {
      cx.strokeStyle = '#8B4513';
      cx.lineWidth = 2;
      cx.beginPath();
      cx.arc(heldX + TS*0.4, heldY + TS*0.4, TS*0.3, -Math.PI/2, Math.PI/2);
      cx.stroke();
    } else {
      drawBlock(hb, heldX, heldY, TS*0.8);
    }

    cx.fillStyle = '#fff';
    cx.font = 'bold 10px monospace';
    cx.textAlign = 'center';
    cx.fillText(NAMES[hb] || '?', heldX + TS*0.4, heldY - 5);
  }

  if(pl.poisonTimer > 0 && Math.floor(Date.now()/200)%2===0){
    cx.fillStyle='rgba(0,255,0,0.2)';
    cx.fillRect(x, y, w, h);
  }
}

// ─── Sky ─────────────────────────────────────────────────────────────────────
function skyColor(){
  const t=dayTime;
  function lerp(a,b,f){ return Math.round(a+(b-a)*f); }
  function lc(a,b,f){
    const [ar,ag,ab]=[a>>16,a>>8&0xff,a&0xff];
    const [br,bg,bb]=[b>>16,b>>8&0xff,b&0xff];
    return `rgb(${lerp(ar,br,f)},${lerp(ag,bg,f)},${lerp(ab,bb,f)})`;
  }
  const NIGHT=0x0a0a24, DAWN=0xff6030, DAY=0x87ceeb, DUSK=0xff5020;
  if(t<4200) return lc(NIGHT,NIGHT,0);
  if(t<5200) return lc(NIGHT,DAWN,(t-4200)/1000);
  if(t<6500) return lc(DAWN,DAY,(t-5200)/1300);
  if(t<17500) return lc(DAY,DAY,0);
  if(t<18500) return lc(DAY,DUSK,(t-17500)/1000);
  if(t<19500) return lc(DUSK,NIGHT,(t-18500)/1000);
  return lc(NIGHT,NIGHT,0);
}
function isNight(){ return dayTime<5000||dayTime>19000; }

// ─── Render ───────────────────────────────────────────────────────────────────
function render(){
  cx.fillStyle=skyColor();
  cx.fillRect(0,0,W,H);

  if(isNight()){
    const ns=120;
    for(let i=0;i<ns;i++){
      const sx=((i*137.5)%WW)*TS*0.1;
      const sy=((i*83.3)%(WH*0.35))*TS*0.1;
      const blink=Math.sin(Date.now()*0.002+i*1.3)>0.3?1:0.4;
      cx.globalAlpha=blink*0.85;
      cx.fillStyle='#fff';
      cx.fillRect((sx-cam.x*0.05+W*5)%W,(sy-cam.y*0.03+H*3)%H,i%3===0?2:1,i%3===0?2:1);
    }
    cx.globalAlpha=1;
  }

  const ang=(dayTime/24000)*Math.PI*2-Math.PI/2;
  const rad=Math.min(W,H)*0.42;
  const sx=W/2+Math.cos(ang)*rad, sy=H/2+Math.sin(ang)*rad*0.45;
  if(!isNight()){
    cx.save();
    const grd=cx.createRadialGradient(sx,sy,10,sx,sy,30);
    grd.addColorStop(0,'#fff9a0'); grd.addColorStop(1,'#FFD700');
    cx.fillStyle=grd;
    cx.beginPath(); cx.arc(sx,sy,24,0,Math.PI*2); cx.fill();
    cx.strokeStyle='rgba(255,220,0,0.5)'; cx.lineWidth=3;
    for(let i=0;i<8;i++){
      const a=(i/8)*Math.PI*2;
      cx.beginPath();
      cx.moveTo(sx+Math.cos(a)*27,sy+Math.sin(a)*27);
      cx.lineTo(sx+Math.cos(a)*38,sy+Math.sin(a)*38);
      cx.stroke();
    }
    cx.restore();
  } else {
    const ma=ang+Math.PI;
    const moonX=W/2+Math.cos(ma)*rad, moonY=H/2+Math.sin(ma)*rad*0.45;
    cx.fillStyle='#e8e8d0';
    cx.beginPath(); cx.arc(moonX,moonY,18,0,Math.PI*2); cx.fill();
    cx.fillStyle='rgba(0,0,20,0.4)';
    cx.beginPath(); cx.arc(moonX+5,moonY-4,14,0,Math.PI*2); cx.fill();
  }

  const plTileY=Math.floor((pl.y+pl.h/2)/TS);
  const plSurf=surf[Math.max(0,Math.min(WW-1,Math.floor(pl.x/TS)))];
  const depth=plTileY-plSurf;
  const darkVal=Math.max(0,Math.min(0.72,depth*0.018));

  const sx0=Math.floor(cam.x/TS)-1, sx1=Math.ceil((cam.x+W)/TS)+1;
  const sy0=Math.floor(cam.y/TS)-1, sy1=Math.ceil((cam.y+H)/TS)+1;

  for(let ty=sy0;ty<=sy1;ty++){
    for(let tx=sx0;tx<=sx1;tx++){
      const b=gb(tx,ty);
      if(b===AIR) continue;
      const bx=Math.round(tx*TS-cam.x), by=Math.round(ty*TS-cam.y);
      let bp=0,bmax=1;
      if(breaking&&breaking.x===tx&&breaking.y===ty){ bp=breaking.p; bmax=breaking.max; }
      drawBlock(b,bx,by,TS,bp,bmax);
    }
  }

  if(darkVal>0){
    cx.fillStyle=`rgba(0,0,10,${darkVal})`;
    cx.fillRect(0,0,W,H);
  }

  for(const p of particles){
    cx.globalAlpha=p.life/45;
    cx.fillStyle=p.color;
    cx.fillRect(p.x-cam.x-p.sz/2,p.y-cam.y-p.sz/2,p.sz,p.sz);
  }
  cx.globalAlpha=1;

  for(const e of entities) e.draw();
  for(const p of projectiles) p.draw();

  drawPlayer();

  const t=getTile();
  if(tileReach(t.x,t.y)&&gb(t.x,t.y)!==AIR){
    cx.strokeStyle='rgba(255,255,255,0.7)';
    cx.lineWidth=2;
    cx.strokeRect(t.x*TS-cam.x+1,t.y*TS-cam.y+1,TS-2,TS-2);
  }

  drawHUD();
}

// ─── HUD ─────────────────────────────────────────────────────────────────────
function drawHUD(){
  const n=hotbar.length;
  const sw=n*54+8, hx=(W-sw)/2, hy=H-72;

  cx.fillStyle='rgba(20,20,20,0.75)';
  roundRect(cx,hx-4,hy-4,sw+8,62,8);
  cx.fill();
  cx.strokeStyle='rgba(255,255,255,0.15)';
  cx.lineWidth=1;
  roundRect(cx,hx-4,hy-4,sw+8,62,8);
  cx.stroke();

  for(let i=0;i<n;i++){
    const bx=hx+i*54, by=hy;
    const b=hotbar[i];

    cx.fillStyle=i===slot?'rgba(255,255,255,0.22)':'rgba(0,0,0,0.3)';
    roundRect(cx,bx,by,50,50,5); cx.fill();

    if(i===slot){
      cx.strokeStyle='#fff';
      cx.lineWidth=2.5;
      roundRect(cx,bx-1,by-1,52,52,6); cx.stroke();
    }

    // 繪製快捷欄物品
    if(b >= WOOD_SWORD && b <= DIAM_SWORD) {
      cx.fillStyle = b === WOOD_SWORD ? '#8B4513' : b === STONE_SWORD ? '#888' : 
                     b === IRON_SWORD ? '#aaa' : b === GOLD_SWORD ? '#FFD700' : '#5dddff';
      cx.fillRect(bx+10, by+35, 30, 8);
      cx.fillRect(bx+22, by+10, 6, 28);
    } else if(b >= WOOD_PICK && b <= DIAM_PICK) {
      cx.fillStyle = b === WOOD_PICK ? '#8B4513' : b === STONE_PICK ? '#888' : 
                     b === IRON_PICK ? '#aaa' : b === GOLD_PICK ? '#FFD700' : '#5dddff';
      cx.fillRect(bx+10, by+35, 30, 6);
      cx.fillRect(bx+12, by+12, 26, 10);
      cx.fillRect(bx+22, by+20, 6, 16);
    } else if(b === BOW) {
      cx.strokeStyle = '#8B4513';
      cx.lineWidth = 2;
      cx.beginPath();
      cx.arc(bx+25, by+25, 12, -Math.PI/2, Math.PI/2);
      cx.stroke();
    } else {
      drawBlock(b,bx+5,by+5,40);
    }

    const cnt=inventory[b]||0;
    if(cnt>0){
      cx.fillStyle='#fff';
      cx.font='bold 11px monospace';
      cx.textAlign='right';
      cx.fillText(cnt,bx+49,by+49);
    }
    cx.fillStyle='rgba(255,255,255,0.5)';
    cx.font='10px monospace';
    cx.textAlign='left';
    cx.fillText(i+1,bx+3,by+12);
  }

  const sname=NAMES[hotbar[slot]]||'';
  cx.fillStyle='rgba(20,20,20,0.7)';
  cx.font='13px monospace';
  const tw=cx.measureText('選擇：'+sname).width+18;
  roundRect(cx,(W-tw)/2,hy-32,tw,22,5); cx.fill();
  cx.fillStyle='#fff';
  cx.textAlign='center';
  cx.fillText('選擇：'+sname,W/2,hy-15);

  // HP bar
  cx.fillStyle='rgba(20,20,20,0.7)';
  roundRect(cx,10,10,170,26,5); cx.fill();
  const hpW=150*(pl.hp/pl.maxHp);
  cx.fillStyle='#e74c3c';
  cx.fillRect(15,15,hpW,16);
  cx.fillStyle='#fff';
  cx.font='bold 13px monospace';
  cx.textAlign='left';
  cx.fillText(`❤ ${pl.hp}/${pl.maxHp}`,18,27);

  // Hunger bar
  cx.fillStyle='rgba(20,20,20,0.7)';
  roundRect(cx,10,42,170,26,5); cx.fill();
  const hgW=150*(pl.hunger/pl.maxHunger);
  cx.fillStyle='#e67e22';
  cx.fillRect(15,47,hgW,16);
  cx.fillStyle='#fff';
  cx.fillText(`🍖 ${Math.floor(pl.hunger)}/${pl.maxHunger}`,18,59);

  // Poison indicator
  if(pl.poisonTimer > 0){
    cx.fillStyle='rgba(0,100,0,0.7)';
    roundRect(cx,10,74,120,22,5); cx.fill();
    cx.fillStyle='#0f0';
    cx.fillText(`☠ 中毒 ${Math.ceil(pl.poisonTimer/60)}s`,18,89);
  }

  // Time of day
  const timeStr=isNight()?'🌙 夜晚':'☀️ 白天';
  cx.fillStyle='rgba(20,20,20,0.7)';
  roundRect(cx,W-110,10,100,26,5); cx.fill();
  cx.fillStyle='#fff';
  cx.font='13px monospace';
  cx.textAlign='center';
  cx.fillText(timeStr,W-60,27);

  // Score
  cx.fillStyle='rgba(20,20,20,0.7)';
  roundRect(cx,W-110,42,100,26,5); cx.fill();
  cx.fillStyle='#ffd700';
  cx.fillText(`⭐ ${score}`,W-60,59);

  // Block tooltip
  const tt=getTile();
  const tb=gb(tt.x,tt.y);
  if(tb!==AIR&&tileReach(tt.x,tt.y)){
    const nm=NAMES[tb]||'?';
    cx.font='13px monospace';
    const tml=cx.measureText(nm).width+20;
    cx.fillStyle='rgba(20,20,20,0.85)';
    roundRect(cx,mx-tml/2,my-34,tml,22,5); cx.fill();
    cx.fillStyle='#ffd700';
    cx.textAlign='center';
    cx.fillText(nm,mx,my-18);
  }

  // Entity tooltip
  for(const e of entities){
    if(!e.dead){
      const ex=Math.floor(e.x/TS), ey=Math.floor(e.y/TS);
      const t=getTile();
      if(t.x===ex && t.y===ey && tileReach(t.x,t.y)){
        const names = {zombie:'殭屍',skeleton:'骷髏',pig:'豬',cow:'牛',chicken:'雞',fish:'魚'};
        const nm=names[e.type]||e.type;
        cx.font='13px monospace';
        const tml=cx.measureText(nm).width+20;
        cx.fillStyle='rgba(20,20,20,0.85)';
        roundRect(cx,mx-tml/2,my-56,tml,22,5); cx.fill();
        cx.fillStyle=e.type==='zombie'||e.type==='skeleton'?'#ff4444':'#44ff44';
        cx.textAlign='center';
        cx.fillText(nm,mx,my-40);
      }
    }
  }

  // Mini instructions
  if(dayTime<800&&dayTime>100){
    cx.fillStyle='rgba(20,20,20,0.7)';
    roundRect(cx,10,110,320,110,6); cx.fill();
    cx.fillStyle='#eee';
    cx.font='12px monospace';
    cx.textAlign='left';
    const hints=['WASD / 方向鍵: 移動','空格: 跳躍','左鍵按住: 挖方塊/攻擊','右鍵: 放方塊','E: 合成表, F: 吃東西'];
    hints.forEach((h,i)=>cx.fillText(h,18,128+i*18));
  }
}

function roundRect(c,x,y,w,h,r){
  c.beginPath();
  c.moveTo(x+r,y);
  c.lineTo(x+w-r,y); c.arcTo(x+w,y,x+w,y+r,r);
  c.lineTo(x+w,y+h-r); c.arcTo(x+w,y+h,x+w-r,y+h,r);
  c.lineTo(x+r,y+h); c.arcTo(x,y+h,x,y+h-r,r);
  c.lineTo(x,y+r); c.arcTo(x,y,x+r,y,r);
  c.closePath();
}


// ─── Crafting System ──────────────────────────────────────────────────────────
let craftGrid = [0,0,0,0,0,0,0,0,0];
let craftSelectedItem = null;
let currentRecipe = null;

function openCrafting(){
  craftingOpen = true;
  document.getElementById('crafting').style.display = 'block';
  craftSelectedItem = null;
  updateCraftingUI();
}

function closeCrafting(){
  craftingOpen = false;
  document.getElementById('crafting').style.display = 'none';
  for(let i=0;i<9;i++){
    if(craftGrid[i]>0){
      inventory[craftGrid[i]] = (inventory[craftGrid[i]]||0) + 1;
      craftGrid[i] = 0;
    }
  }
  craftSelectedItem = null;
}

function clickCraftSlot(idx){
  if(craftGrid[idx]>0){
    inventory[craftGrid[idx]] = (inventory[craftGrid[idx]]||0) + 1;
    craftGrid[idx] = 0;
  } else if(craftSelectedItem !== null){
    if((inventory[craftSelectedItem]||0) > 0){
      craftGrid[idx] = craftSelectedItem;
      inventory[craftSelectedItem]--;
      if(inventory[craftSelectedItem] <= 0) delete inventory[craftSelectedItem];
    }
  }
  checkRecipe();
  updateCraftingUI();
}

function selectInvItem(itemId){
  craftSelectedItem = itemId;
  updateCraftingUI();
}

function checkRecipe(){
  currentRecipe = null;
  for(const recipe of RECIPES){
    let match = true;
    for(let i=0;i<9;i++){
      if(recipe.grid[i] !== 0 && craftGrid[i] !== recipe.grid[i]){
        match = false; break;
      }
      if(recipe.grid[i] === 0 && craftGrid[i] !== 0){
        match = false; break;
      }
    }
    if(match){
      currentRecipe = recipe;
      break;
    }
  }
}

function doCraft(){
  if(!currentRecipe) return;

  for(let i=0;i<9;i++){
    if(currentRecipe.grid[i] !== 0){
      craftGrid[i] = 0;
    }
  }

  inventory[currentRecipe.result] = (inventory[currentRecipe.result]||0) + currentRecipe.count;

  // 修正：合成道具自動加入快捷欄任何空位
  if(!hotbar.includes(currentRecipe.result)){
    for(let i=0;i<hotbar.length;i++){
      if(hotbar[i]===AIR || hotbar[i]===GRASS || hotbar[i]===DIRT || hotbar[i]===SAND){
        hotbar[i] = currentRecipe.result;
        break;
      }
    }
  }

  showMsg('🔨 合成成功! 獲得 '+currentRecipe.name+' x'+currentRecipe.count);
  currentRecipe = null;
  checkRecipe();
  updateCraftingUI();
}

function autoCraft(){
  for(let i=0;i<9;i++){
    if(craftGrid[i]>0){
      inventory[craftGrid[i]] = (inventory[craftGrid[i]]||0) + 1;
      craftGrid[i] = 0;
    }
  }

  for(const recipe of RECIPES){
    let canCraft = true;
    const needed = {};

    for(let i=0;i<9;i++){
      if(recipe.grid[i] !== 0){
        needed[recipe.grid[i]] = (needed[recipe.grid[i]]||0) + 1;
      }
    }

    for(const [mat, count] of Object.entries(needed)){
      if((inventory[parseInt(mat)]||0) < count){
        canCraft = false;
        break;
      }
    }

    if(canCraft){
      for(let i=0;i<9;i++){
        if(recipe.grid[i] !== 0){
          craftGrid[i] = recipe.grid[i];
          inventory[recipe.grid[i]]--;
          if(inventory[recipe.grid[i]] <= 0) delete inventory[recipe.grid[i]];
        }
      }

      inventory[recipe.result] = (inventory[recipe.result]||0) + recipe.count;

      if(!hotbar.includes(recipe.result)){
        for(let i=0;i<hotbar.length;i++){
          if(hotbar[i]===AIR || hotbar[i]===GRASS || hotbar[i]===DIRT || hotbar[i]===SAND){
            hotbar[i] = recipe.result;
            break;
          }
        }
      }

      showMsg('⚡ 一鍵合成成功! 獲得 '+recipe.name+' x'+recipe.count);
      currentRecipe = null;
      updateCraftingUI();
      return;
    }
  }

  showMsg('❌ 背包中沒有足夠材料合成任何物品');
  updateCraftingUI();
}

function autoCraftRecipe(recipe){
  for(let i=0;i<9;i++){
    if(craftGrid[i]>0){
      inventory[craftGrid[i]] = (inventory[craftGrid[i]]||0) + 1;
      craftGrid[i] = 0;
    }
  }

  let canCraft = true;
  const needed = {};
  for(let i=0;i<9;i++){
    if(recipe.grid[i] !== 0){
      needed[recipe.grid[i]] = (needed[recipe.grid[i]]||0) + 1;
    }
  }
  for(const [mat, count] of Object.entries(needed)){
    if((inventory[parseInt(mat)]||0) < count){
      canCraft = false;
      break;
    }
  }

  if(!canCraft){
    showMsg('❌ 材料不足!');
    return;
  }

  for(let i=0;i<9;i++){
    if(recipe.grid[i] !== 0){
      craftGrid[i] = recipe.grid[i];
      inventory[recipe.grid[i]]--;
      if(inventory[recipe.grid[i]] <= 0) delete inventory[recipe.grid[i]];
    }
  }

  inventory[recipe.result] = (inventory[recipe.result]||0) + recipe.count;

  if(!hotbar.includes(recipe.result)){
    for(let i=0;i<hotbar.length;i++){
      if(hotbar[i]===AIR || hotbar[i]===GRASS || hotbar[i]===DIRT || hotbar[i]===SAND){
        hotbar[i] = recipe.result;
        break;
      }
    }
  }

  showMsg('⚡ 合成成功! 獲得 '+recipe.name+' x'+recipe.count);
  currentRecipe = null;
  updateCraftingUI();
}

function updateCraftingUI(){
  for(let i=0;i<9;i++){
    const slot = document.getElementById('cg'+i);
    if(craftGrid[i]>0){
      slot.innerHTML = (EMOJIS[craftGrid[i]]||'❓') + '<span class="count">1</span>';
      slot.style.background = '#4a3a2a';
    } else {
      slot.innerHTML = '';
      slot.style.background = '#5a3a1a';
    }
  }

  const resultSlot = document.getElementById('result-slot');
  const outputSlot = document.getElementById('output-slot');
  const craftBtn = document.getElementById('craft-btn');

  if(currentRecipe){
    resultSlot.innerHTML = (EMOJIS[currentRecipe.result]||'❓') + '<span class="count">'+currentRecipe.count+'</span>';
    outputSlot.innerHTML = (EMOJIS[currentRecipe.result]||'❓') + '<span class="count">'+currentRecipe.count+'</span>';
    outputSlot.style.borderColor = '#ffd700';
    craftBtn.disabled = false;
  } else {
    resultSlot.innerHTML = '';
    outputSlot.innerHTML = '❓';
    outputSlot.style.borderColor = '#8B4513';
    craftBtn.disabled = true;
  }

  const invGrid = document.getElementById('inv-grid');
  invGrid.innerHTML = '';
  const items = Object.entries(inventory).filter(([id,count]) => count > 0);

  if(items.length === 0){
    invGrid.innerHTML = '<div style="color:#888;grid-column:1/-1;text-align:center;">背包是空的</div>';
  } else {
    for(const [id, count] of items){
      const itemId = parseInt(id);
      const div = document.createElement('div');
      div.className = 'inv-item' + (craftSelectedItem===itemId?' selected':'');
      div.innerHTML = (EMOJIS[itemId]||'❓') + '<span class="cnt">'+count+'</span>';
      div.title = NAMES[itemId] || '?';
      div.onclick = () => selectInvItem(itemId);
      invGrid.appendChild(div);
    }
  }

  const list = document.getElementById('craft-list');
  list.innerHTML = '';
  for(const recipe of RECIPES){
    let canAuto = true;
    const needed = {};
    for(let i=0;i<9;i++){
      if(recipe.grid[i] !== 0){
        needed[recipe.grid[i]] = (needed[recipe.grid[i]]||0) + 1;
      }
    }
    for(const [mat, count] of Object.entries(needed)){
      if((inventory[parseInt(mat)]||0) < count){
        canAuto = false;
        break;
      }
    }

    const item = document.createElement('div');
    item.className = 'craft-item' + (canAuto?'':' disabled');
    item.style.opacity = canAuto ? '1' : '0.4';
    item.innerHTML = '<span class="emoji">'+(EMOJIS[recipe.result]||'❓')+'</span>'+recipe.name;
    if(canAuto){
      item.onclick = () => autoCraftRecipe(recipe);
    }
    list.appendChild(item);
  }
}

// ─── Eating ───────────────────────────────────────────────────────────────────
function eatFood(){
  const foods = [COOKED_PORK, COOKED_BEEF, COOKED_CHICKEN, COOKED_FISH, PORK, BEEF, CHICKEN, FISH, ROTTEN];
  for(const food of foods){
    if((inventory[food]||0) > 0){
      inventory[food]--;
      if(inventory[food] <= 0) delete inventory[food];

      const val = FOOD_VALUE[food] || 2;
      pl.hunger = Math.min(pl.maxHunger, pl.hunger + val);

      if(POISON_CHANCE[food] && Math.random() < POISON_CHANCE[food]){
        pl.poisonTimer = 600;
        showMsg('☠ 你吃了腐肉，中毒了!');
      } else {
        showMsg('🍖 吃了 '+NAMES[food]+'，飢餓度 +' + val);
      }

      if(pl.hunger >= pl.maxHunger && pl.hp < pl.maxHp){
        pl.hp = Math.min(pl.maxHp, pl.hp + 1);
      }

      for(let i=0;i<5;i++){
        particles.push({
          x:pl.x+pl.w/2, y:pl.y,
          vx:(Math.random()-0.5)*3, vy:Math.random()*-2-1,
          life:30, color:'#e67e22', sz:4
        });
      }
      return;
    }
  }
  showMsg('❌ 沒有食物可以吃!');
}

// ─── Death & Respawn ──────────────────────────────────────────────────────────
function die(reason){
  document.getElementById('death-reason').textContent = reason;
  document.getElementById('death-score').textContent = score;
  document.getElementById('death-screen').style.display = 'flex';
}

function respawn(){
  document.getElementById('death-screen').style.display = 'none';
  pl.hp = pl.maxHp;
  pl.hunger = pl.maxHunger;
  pl.poisonTimer = 0;
  pl.x = Math.floor(WW/2)*TS+TS/2-pl.w/2;
  pl.y = (surf[Math.floor(pl.x/TS)]-4)*TS;
  pl.vx = 0; pl.vy = 0;
  score = Math.floor(score * 0.5);

  entities = entities.filter(e => e.type!=='zombie' && e.type!=='skeleton');
  projectiles = [];
}

// ─── Input ────────────────────────────────────────────────────────────────────
window.addEventListener('keydown',e=>{
  if(craftingOpen){
    if(e.key==='e' || e.key==='E' || e.key==='Escape'){
      closeCrafting();
      return;
    }
    return;
  }
  keys[e.key]=true;

  // 修正：數字鍵 1-8 切換快捷欄，所有欄位都可以切換
  if(e.key>='1'&&e.key<='8'){
    slot = parseInt(e.key) - 1;
    showMsg('切換到 ['+e.key+'] ' + (NAMES[hotbar[slot]] || '空'));
  }

  if(e.key==='e' || e.key==='E') openCrafting();
  if(e.key==='f' || e.key==='F') eatFood();
  if(['Space','ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.code)) e.preventDefault();
});
window.addEventListener('keyup',e=>{ keys[e.key]=false; });

cv.addEventListener('mousemove',e=>{ const r=cv.getBoundingClientRect(); mx=e.clientX-r.left; my=e.clientY-r.top; });

cv.addEventListener('mousedown',e=>{
  e.preventDefault();
  if(e.button===0){ mleft=true; }
  if(e.button===2&&placeCD<=0){
    const t=getTile();
    if(tileReach(t.x,t.y)&&gb(t.x,t.y)===AIR){
      const px0=Math.floor(pl.x/TS), px1=Math.floor((pl.x+pl.w-1)/TS);
      const py0=Math.floor(pl.y/TS), py1=Math.floor((pl.y+pl.h-1)/TS);
      if(t.x<px0||t.x>px1||t.y<py0||t.y>py1){
        const item = hotbar[slot];
        // 修正：只允許放置方塊類物品（0-16），道具不能放置
        if(item <= TORCH) {
          if((inventory[item]||0) > 0 || item === GRASS){
            if(item !== GRASS){
              inventory[item]--;
              if(inventory[item] <= 0) delete inventory[item];
            }
            sb(t.x,t.y,item);
            placeCD=12;
            showMsg('放置了 '+NAMES[item]);
          } else {
            showMsg('❌ '+NAMES[item]+' 數量不足!');
          }
        } else {
          showMsg('❌ '+NAMES[item]+' 不能放置!');
        }
      }
    }
  }
});
cv.addEventListener('mouseup',e=>{ if(e.button===0) mleft=false; });
cv.addEventListener('contextmenu',e=>e.preventDefault());

cv.addEventListener('wheel',e=>{
  slot = (slot + (e.deltaY>0?1:-1) + hotbar.length) % hotbar.length;
  showMsg('切換到 ['+(slot+1)+'] ' + (NAMES[hotbar[slot]] || '空'));
});

// Touch support
cv.addEventListener('touchstart',e=>{
  e.preventDefault();
  const r=cv.getBoundingClientRect();
  mx=e.touches[0].clientX-r.left; my=e.touches[0].clientY-r.top;
  mleft=true;
},{passive:false});
cv.addEventListener('touchend',e=>{ mleft=false; },{passive:false});

// ─── Init & Loop ─────────────────────────────────────────────────────────────
let started=false;
function startGame(){
  if(started) return; started=true;

  const speedSelect = document.getElementById('daySpeed');
  if(speedSelect){
    daySpeed = parseFloat(speedSelect.value);
  }

  document.getElementById('overlay').style.display='none';
  genWorld();
  const sx=Math.floor(WW/2);
  pl.x=sx*TS+TS/2-pl.w/2;
  pl.y=(surf[sx]-4)*TS;
  cam.x=pl.x+pl.w/2-W/2;
  cam.y=pl.y+pl.h/2-H/2;
  spawnEntities();
  loop();
}

function loop(){
  update();
  render();
  requestAnimationFrame(loop);
}

cx.fillStyle='#fff';
cx.font='bold 28px monospace';
cx.textAlign='center';
cx.fillText('⛏️ 正在準備世界...', W/2, H/2);
